version: "3.9"

services:
  # ─── PostgreSQL ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: trendio_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: trendio_db
      POSTGRES_USER: trendio_user
      POSTGRES_PASSWORD: trendio_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trendio_user -d trendio_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: trendio_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Django Backend ──────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: trendio_backend
    restart: unless-stopped
    volumes:
      - .:/app
      - media_data:/app/media
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: postgres://trendio_user:trendio_pass@db:5432/trendio_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Celery Worker ───────────────────────────────────────
  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: trendio_celery
    restart: unless-stopped
    command: celery -A config worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: postgres://trendio_user:trendio_pass@db:5432/trendio_db
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      - db
      - redis

  # ─── Celery Beat (Scheduler) ─────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: trendio_celery_beat
    restart: unless-stopped
    command: celery -A config beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: postgres://trendio_user:trendio_pass@db:5432/trendio_db
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  media_data:
